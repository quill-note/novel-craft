<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e87b6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="quill-note">
<title>quill-note</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #e87b6b;
    --primary-dark: #c9584a;
    --primary-light: #f5a99e;
    --primary-pale: #fdf0ee;
    --bg: #fef8f7;
    --surface: #ffffff;
    --surface2: #fdf3f2;
    --border: #f0d5d1;
    --text: #4a2525;
    --text2: #7a4545;
    --text3: #aa7777;
    --shadow: rgba(232,123,107,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ヘッダー */
  .header {
    background: var(--surface);
    padding: 14px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .header h1 {
    font-size: 20px;
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* カードリスト */
  .card-list {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 2px 6px var(--shadow);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: box-shadow 0.2s;
    color: inherit;
  }

  .card:hover {
    box-shadow: 0 4px 12px var(--shadow);
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--primary-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon .material-icons-round {
    font-size: 22px;
    color: var(--primary);
  }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }

  .card-desc {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.5;
  }

  .card-arrow {
    color: var(--border);
    font-size: 22px;
    flex-shrink: 0;
  }


</style>
</head>
<body>

<div class="header">
  <h1>quill-note</h1>
  <div class="header-sub">創作サポートツール</div>
</div>

<div class="card-list">
  <a class="card" href="./novel-craft/">
    <div class="card-icon">
      <span class="material-icons-round">edit_note</span>
    </div>
    <div class="card-body">
      <div class="card-name">執筆補助</div>
      <div class="card-desc">書式整形・推敲チェック・投稿用分割</div>
    </div>
    <span class="material-icons-round card-arrow">chevron_right</span>
  </a>

  <a class="card" href="./byosha-hikidashi/">
    <div class="card-icon">
      <span class="material-icons-round">auto_fix_high</span>
    </div>
    <div class="card-body">
      <div class="card-name">描写の引き出し</div>
      <div class="card-desc">表現検索・描写練習・マイ辞典</div>
    </div>
    <span class="material-icons-round card-arrow">chevron_right</span>
  </a>
</div>

</body>
</html>
