<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>執筆補助</title>
<meta name="theme-color" content="#e87b6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="執筆補助">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#e87b6b;--primary-dark:#c9584a;--primary-light:#f5a99e;--primary-pale:#fdf0ee;--bg:#fef8f7;--surface:#fff;--border:#f0d5d1;--text:#4a2525;--text2:#7a4545;--text3:#aa7777;--success:#4a9e6e;--warn:#c48a2a;--warnbg:#fef9eb;--info:#5b8fd4;--info-pale:#eaf1fb;--shadow:rgba(232,123,107,.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-mincho:'Zen Old Mincho',serif;--tr:.2s ease}
.mi{font-family:'Material Icons Round';font-style:normal;font-size:20px;line-height:1;vertical-align:middle;user-select:none}.mi-sm{font-size:16px}.mi-xs{font-size:14px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100}.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}.header-title{display:flex;align-items:center;gap:10px}.header-title .mi{font-size:24px;color:var(--primary)}.header h1{font-size:18px;font-weight:700;color:var(--primary-dark)}.char-counts{display:flex;gap:12px;font-size:12px;color:var(--text2)}.char-counts span{background:var(--primary-pale);padding:4px 12px;border-radius:20px}.char-counts strong{color:var(--primary-dark);font-weight:700}
.tab-nav{max-width:1200px;margin:0 auto;padding:12px 24px 0;display:flex;gap:4px}.tab-btn{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;font-weight:500;padding:9px 18px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:var(--radius-md) var(--radius-md) 0 0;transition:var(--tr);display:flex;align-items:center;gap:6px}.tab-btn .mi{font-size:16px}.tab-btn:hover{background:var(--primary-pale);color:var(--primary)}.tab-btn.active{background:var(--surface);color:var(--primary-dark);box-shadow:0 1px 6px var(--shadow);font-weight:700}
.main{max-width:1200px;margin:0 auto;padding:0 24px 40px}.tab-panel{display:none;background:var(--surface);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);box-shadow:0 1px 6px var(--shadow);padding:24px;animation:fadeIn .25s ease}.tab-panel.active{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.editor-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}.editor-col h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}.editor-col h3 .badge{font-size:10px;font-weight:500;background:var(--primary-pale);color:var(--primary);padding:2px 8px;border-radius:10px}
textarea,.output-area{width:100%;min-height:420px;padding:16px;font-family:var(--font-mincho);font-size:15px;line-height:2;border:1.5px solid var(--border);border-radius:var(--radius-md);resize:vertical;transition:var(--tr);background:var(--surface);color:var(--text)}textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(232,123,107,.1)}.output-area{background:var(--bg);overflow-y:auto;white-space:pre-wrap;word-wrap:break-word}
.settings-panel{margin-bottom:16px}.settings-toggle{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;font-weight:500;color:var(--text2);background:var(--bg);border:1px solid var(--border);padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:6px}.settings-toggle:hover{border-color:var(--primary-light);color:var(--primary)}.settings-body{display:none;margin-top:12px;padding:20px;background:var(--bg);border-radius:var(--radius-md);border:1px solid var(--border)}.settings-body.open{display:block}
.setting-group{margin-bottom:16px}.setting-group-title{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--primary-pale);display:flex;align-items:center;gap:6px}.setting-group-title .mi{font-size:14px}.setting-row{display:flex;align-items:center;gap:12px;padding:6px 0}.setting-row label{font-size:13px;color:var(--text);flex:1}.setting-row small{font-size:11px;color:var(--text3);display:block;margin-top:1px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}.toggle input{display:none}.toggle .slider{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:var(--tr)}.toggle .slider::before{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:var(--surface);border-radius:50%;transition:var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.15)}.toggle input:checked+.slider{background:var(--primary)}.toggle input:checked+.slider::before{transform:translateX(18px)}
select,.input-text{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);transition:var(--tr)}select:focus,.input-text:focus{outline:none;border-color:var(--primary-light)}
.btn{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}.btn .mi{font-size:14px}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{background:var(--primary-pale);color:var(--primary);border-color:var(--primary-light)}.btn-sm{font-size:12px;padding:6px 12px}.btn-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.btn-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:var(--radius-sm);transition:var(--tr);flex-shrink:0}.btn-icon:hover{color:var(--primary);background:var(--primary-pale)}.btn-icon .mi{font-size:16px}
.hl-yure{background:rgba(196,138,42,.18);border-bottom:2px solid var(--warn);border-radius:2px;cursor:pointer}.hl-yure:hover{background:rgba(196,138,42,.35)}
.hl-gobi{background:rgba(232,123,107,.18);border-bottom:2px solid var(--primary);border-radius:2px}
.hl-ng{background:rgba(91,143,212,.18);border-bottom:2px solid var(--info);border-radius:2px}
.yure-popup{position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:0 4px 16px var(--shadow);padding:12px;min-width:200px;max-width:280px;font-size:13px}.yure-popup-title{font-size:11px;color:var(--text3);margin-bottom:8px;font-family:var(--font-mincho);line-height:1.6}.yure-popup-title mark{background:rgba(196,138,42,.25);color:var(--warn);border-radius:2px;font-style:normal;padding:0 2px}.yure-popup .btn{width:100%;justify-content:center;margin-bottom:6px}.yure-popup .btn:last-child{margin-bottom:0}
.proof-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.proof-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px}
.proof-badge.gobi{background:var(--primary-pale);color:var(--primary-dark)}.proof-badge.yure{background:var(--warnbg);color:var(--warn)}.proof-badge.ng{background:var(--info-pale);color:var(--info)}
.proof-item{padding:6px 0;border-bottom:1px solid var(--primary-pale);cursor:pointer;display:flex;align-items:flex-start;gap:8px;font-size:12px}.proof-item:last-child{border-bottom:none}.proof-item:hover{background:var(--primary-pale);margin:0 -8px;padding:6px 8px;border-radius:var(--radius-sm)}.proof-item.ignored{opacity:.4;background:var(--bg);text-decoration:none}.proof-item.ignored .proof-tag{opacity:.5}.proof-item.ignored>span:nth-child(2){color:var(--text3)}
.proof-item-body{flex:1;min-width:0}
.proof-snippets{margin-top:4px;display:flex;flex-direction:column;gap:3px}
.proof-snippet{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-family:var(--font-mincho);line-height:1.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:var(--tr)}.proof-snippet:hover{border-color:var(--warn);background:var(--warnbg)}.proof-snippet mark{background:rgba(196,138,42,.25);color:var(--warn);border-radius:2px;font-style:normal;padding:0 1px}.proof-snippet.ng-snip:hover{border-color:var(--info);background:var(--info-pale)}.proof-snippet.ng-snip mark{background:rgba(91,143,212,.25);color:var(--info)}
.proof-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;margin-right:4px;flex-shrink:0}.proof-tag.gobi{background:var(--primary-pale);color:var(--primary-dark)}.proof-tag.yure{background:var(--warnbg);color:var(--warn)}.proof-tag.ng{background:var(--info-pale);color:var(--info)}
.proof-actions{margin-left:auto;display:flex;gap:2px;flex-shrink:0}
.split-settings{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}.split-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}.split-field input[type="number"]{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:14px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);width:100px;text-align:center;color:var(--text)}
.split-results{display:flex;flex-direction:column;gap:12px}.split-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px}.split-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.split-card-header h4{font-size:13px;color:var(--primary-dark);font-weight:700}.split-card-header span{font-size:11px;color:var(--text3)}.split-card pre{font-family:var(--font-mincho);font-size:14px;line-height:1.9;white-space:pre-wrap;word-wrap:break-word;max-height:280px;overflow-y:auto;color:var(--text2)}.split-label{font-size:11px;font-weight:700;color:var(--text3);margin:8px 0 4px;padding:4px 8px;background:var(--primary-pale);border-radius:4px;display:inline-block}.split-ellipsis{text-align:center;color:var(--text3);padding:12px 0;font-size:12px;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);margin:4px 0}
.split-mode-tabs{display:flex;gap:4px;margin-bottom:12px}.split-mode-tab{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:12px;padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text3);cursor:pointer;transition:var(--tr)}.split-mode-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.rule-list{margin-top:8px}.rule-row{display:flex;gap:6px;align-items:center;padding:3px 0}.rule-row .input-text{flex:1;min-width:0}.rule-add{display:flex;gap:6px;align-items:center;margin-top:8px}.rule-add .input-text{flex:1;min-width:0}
.collapse-toggle{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:12px;font-weight:700;color:var(--primary);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0 0 4px;margin-bottom:10px;border-bottom:1px solid var(--primary-pale);width:100%}.collapse-toggle .mi{font-size:14px;transition:transform .2s}.collapse-toggle.open .mi-arrow{transform:rotate(180deg)}.collapse-body{display:none}.collapse-body.open{display:block}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(74,37,37,.35);z-index:500;align-items:flex-end;justify-content:center}.modal-overlay.show{display:flex}.modal-panel{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:20px;animation:slideUp .3s ease}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.modal-header h3{font-size:15px;font-weight:700;color:var(--primary-dark);display:flex;align-items:center;gap:6px}.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;box-shadow:0 4px 12px var(--shadow);transition:transform .3s ease,opacity .3s ease;opacity:0;z-index:600;pointer-events:none;display:flex;align-items:center;gap:8px}.toast .mi{font-size:16px}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.mobile-btn{display:none}
@media(max-width:768px){.editor-layout{grid-template-columns:1fr}.desktop-col{display:none}.mobile-btn{display:inline-flex}.header-inner{flex-direction:column;align-items:flex-start}.tab-nav{padding:8px 16px 0;overflow-x:auto}.tab-btn{padding:8px 14px;font-size:12px;white-space:nowrap}.main{padding:0 16px 32px}.tab-panel{padding:16px}textarea{min-height:300px}.split-settings{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="header-title"><span class="mi">edit_note</span><h1>執筆補助</h1></div><div class="char-counts"><span>原文: <strong id="srcCount">0</strong> 文字</span><span>完成版: <strong id="outCount">0</strong> 文字</span></div></div></header>
<nav class="tab-nav"><button class="tab-btn active" data-tab="editor"><span class="mi mi-sm">edit</span>エディタ</button><button class="tab-btn" data-tab="proofread"><span class="mi mi-sm">search</span>推敲チェック</button><button class="tab-btn" data-tab="split"><span class="mi mi-sm">content_cut</span>投稿用分割</button></nav>
<main class="main">
<section class="tab-panel active" id="panel-editor">
<div class="settings-panel"><button class="settings-toggle" id="sToggle"><span class="mi mi-sm">settings</span>書式設定を開く</button>
<div class="settings-body" id="sBody">
<div class="setting-group"><div class="setting-group-title"><span class="mi">swap_horiz</span>文字種の変換</div>
<div class="setting-row"><label>英字</label><select id="optAlpha"><option value="none">変更しない</option><option value="full">全角</option><option value="half" selected>半角</option></select></div>
<div class="setting-row"><label>数字</label><select id="optNum"><option value="none">変更しない</option><option value="full">全角</option><option value="half" selected>半角</option></select></div>
<div class="setting-row"><label>記号(!?)</label><select id="optSym"><option value="none">変更しない</option><option value="full" selected>全角</option><option value="half">半角</option></select></div></div>
<div class="setting-group"><div class="setting-group-title"><span class="mi">tune</span>変換ルール</div>
<div class="setting-row"><label>行頭の字下げ<small>段落先頭に全角スペース</small></label><div class="toggle"><input type="checkbox" id="optIndent" checked><span class="slider"></span></div></div>
<div class="setting-row"><label>カギ括弧の句点<small>」直前の。を削除</small></label><div class="toggle"><input type="checkbox" id="optBP" checked><span class="slider"></span></div></div>
<div class="setting-row"><label>記号後のスペース<small>！？直後に全角スペース</small></label><div class="toggle"><input type="checkbox" id="optSS" checked><span class="slider"></span></div></div>
<div class="setting-row"><label>リーダー・ダッシュ統一<small>…や—を2連続に</small></label><div class="toggle"><input type="checkbox" id="optLD" checked><span class="slider"></span></div></div>
<div class="setting-row"><label>シーン区切りの空行<small>記号行の前後を空ける</small></label><div class="toggle"><input type="checkbox" id="optSB" checked><span class="slider"></span></div></div></div>
<div class="setting-group" style="margin-bottom:0"><div class="setting-group-title"><span class="mi">translate</span>ルビ一括変換<small style="font-weight:400;color:var(--text3);margin-left:6px">|漢字《るび》</small></div>
<div id="rubyList" class="rule-list"></div>
<div class="rule-add"><input class="input-text" id="rubyK" placeholder="漢字"><input class="input-text" id="rubyR" placeholder="読み"><button class="btn btn-secondary btn-sm" onclick="addRuby()"><span class="mi mi-xs">add</span></button></div></div>
</div></div>
<div class="editor-layout">
<div class="editor-col"><h3><span class="mi mi-sm">edit</span>原文エディタ</h3>
<textarea id="srcEditor" placeholder="ここに小説のテキストを貼り付けてください…"></textarea>
<div class="btn-bar"><button class="btn btn-primary btn-sm" onclick="formatDirect()"><span class="mi mi-xs">auto_fix_high</span>体裁を整える</button><button class="btn btn-primary btn-sm mobile-btn" onclick="openMod('preview')"><span class="mi mi-xs">visibility</span>完成版</button></div>
<div class="btn-bar" style="margin-top:6px"><button class="btn btn-secondary btn-sm" onclick="doSave()"><span class="mi mi-xs">save</span>保存</button><button class="btn btn-secondary btn-sm" onclick="expTxt('src')"><span class="mi mi-xs">download</span>TXT</button><button class="btn btn-secondary btn-sm" onclick="document.getElementById('fIn').click()"><span class="mi mi-xs">upload_file</span>読込</button><input type="file" id="fIn" accept=".txt" style="display:none" onchange="loadF(event)"></div></div>
<div class="editor-col desktop-col"><h3><span class="mi mi-sm">auto_fix_high</span>完成版<span class="badge">リアルタイム</span></h3>
<div class="output-area" id="outPrev"></div>
<div class="btn-bar"><button class="btn btn-primary btn-sm" onclick="applyToSrc()"><span class="mi mi-xs">check</span>完成版を原文に反映</button></div>
<div class="btn-bar" style="margin-top:6px"><button class="btn btn-secondary btn-sm" onclick="expTxt('out')"><span class="mi mi-xs">download</span>TXT</button><button class="btn btn-secondary btn-sm" onclick="cpOut()"><span class="mi mi-xs">content_copy</span>コピー</button></div></div>
</div></section>

<section class="tab-panel" id="panel-proofread">
<p style="font-size:13px;color:var(--text2);margin-bottom:12px">完成版テキストに対してチェックします。</p>
<button class="collapse-toggle" id="yureToggle" onclick="tog('yure')"><span class="mi">menu_book</span>表記ゆれルール（<span id="yureCt">0</span>件）<span class="mi mi-arrow" style="margin-left:auto">expand_more</span></button>
<div class="collapse-body" id="yureBody"><div id="yureList" class="rule-list"></div>
<div class="rule-add"><input class="input-text" id="yA" placeholder="例：わたし"><span style="color:var(--text3);flex-shrink:0">↔</span><input class="input-text" id="yB" placeholder="例：私"><button class="btn btn-secondary btn-sm" onclick="addYure()"><span class="mi mi-xs">add</span></button></div></div>

<button class="collapse-toggle" id="ngToggle" onclick="tog('ng')" style="margin-top:12px"><span class="mi">block</span>NGリスト（<span id="ngCt">0</span>件）<span class="mi mi-arrow" style="margin-left:auto">expand_more</span></button>
<div class="collapse-body" id="ngBody"><div id="ngList" class="rule-list"></div>
<div class="rule-add"><input class="input-text" id="ngW" placeholder="例：胸がぎゅっと"><button class="btn btn-secondary btn-sm" onclick="addNg()"><span class="mi mi-xs">add</span></button></div></div>

<div style="margin:16px 0;display:flex;flex-direction:column;gap:10px">
<div class="setting-row" style="gap:8px;padding:0"><span style="font-size:13px">語尾連続：</span><select id="gobiSens"><option value="2">2回</option><option value="3" selected>3回</option></select></div>
<div class="setting-row" style="gap:8px;padding:0;flex-wrap:wrap"><span style="font-size:13px">NG再登場距離：</span><select id="ngDist"><option value="1000">1000字以内</option><option value="2000" selected>2000字以内</option><option value="3000">3000字以内</option><option value="5000">5000字以内</option></select><span style="font-size:11px;color:var(--text3)">以内に同じ語が出たら警告</span></div>
</div>
<button class="btn btn-primary" onclick="runProof()"><span class="mi mi-xs">search</span>チェック実行</button>
<div class="proof-summary" id="proofSum" style="display:none"></div>
<div class="output-area" id="proofText" style="display:none;margin-top:12px;line-height:2.2;min-height:300px"></div>
</section>

<section class="tab-panel" id="panel-split">
<p style="font-size:13px;color:var(--text2);margin-bottom:12px">完成版テキストを投稿サイト向けに分割します。</p>
<div class="split-mode-tabs"><button class="split-mode-tab active" onclick="setSM('count',this)">分割数で</button><button class="split-mode-tab" onclick="setSM('chars',this)">文字数で</button></div>
<div class="split-settings">
<div class="split-field" id="spCntF"><label>分割数</label><input type="number" id="spCnt" value="2" min="2" max="20"></div>
<div class="split-field" id="spChrF" style="display:none"><label>1パートの目安</label><input type="number" id="spChr" value="1500" min="500" step="500"></div>
<button class="btn btn-primary btn-sm" onclick="runSplit()"><span class="mi mi-xs">content_cut</span>分割</button></div>
<div class="split-results" id="spRes"><p style="font-size:13px;color:var(--text3)">分割結果がここに表示されます。</p></div>
</section>
</main>

<div class="modal-overlay" id="mOvl" onclick="if(event.target===this)closeMod()"><div class="modal-panel"><div class="modal-header"><h3 id="mTitle"></h3><button class="modal-close" onclick="closeMod()"><span class="mi">close</span></button></div><div id="mCont"></div></div></div>
<div class="yure-popup" id="yPop" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
const D_YURE=[['ため','為'],['ください','下さい'],['いただく','頂く'],['できる','出来る'],['すべて','全て'],['わかる','分かる'],['いう','言う'],['みる','見る'],['ほう','方'],['わけ','訳'],['ほど','程']];
const D_NG=['胸がぎゅっと','心臓がバクバク','どうしよう','ということ','かもしれない','気がする','目が合う','視線','息を呑む'];
let yureRules=[],ngRules=[],rubyRules=[],fmt='',splitMode='count',issues=[],ignored=new Set();

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');document.getElementById('panel-'+b.dataset.tab).classList.add('active');
  }));
  document.getElementById('sToggle').addEventListener('click',()=>{const d=document.getElementById('sBody');d.classList.toggle('open');document.getElementById('sToggle').innerHTML=d.classList.contains('open')?'<span class="mi mi-sm">settings</span>書式設定を閉じる':'<span class="mi mi-sm">settings</span>書式設定を開く';});
  const s=document.getElementById('srcEditor');
  s.addEventListener('input',()=>{upPrev();upCt();});
  const sv=ls('novelcraft_src');if(sv){s.value=sv;upPrev();upCt();}
  yureRules=lj('novelcraft_yure')||[...D_YURE];rYure();
  ngRules=lj('novelcraft_ng')||[...D_NG];rNg();
  rubyRules=lj('novelcraft_ruby')||[];rRuby();
  document.addEventListener('click',e=>{if(!e.target.closest('.yure-popup')&&!e.target.closest('.hl-yure'))hPop();});
});
function ls(k){return localStorage.getItem(k)}
function lj(k){try{const v=ls(k);return v?JSON.parse(v):null}catch(e){return null}}
function tog(id){document.getElementById(id+'Toggle').classList.toggle('open');document.getElementById(id+'Body').classList.toggle('open');}

function openMod(t){
  upPrev();const ti=document.getElementById('mTitle'),co=document.getElementById('mCont');
  if(t==='preview'){ti.innerHTML='<span class="mi mi-sm">auto_fix_high</span>完成版';co.innerHTML='<div class="output-area" style="min-height:250px">'+eH(fmt)+'</div><div class="btn-bar"><button class="btn btn-primary btn-sm" onclick="applyToSrc();closeMod()"><span class="mi mi-xs">check</span>原文に反映</button><button class="btn btn-secondary btn-sm" onclick="cpOut()"><span class="mi mi-xs">content_copy</span>コピー</button><button class="btn btn-secondary btn-sm" onclick="expTxt(\'out\')"><span class="mi mi-xs">download</span>TXT</button></div>';}
  else if(t==='proof'){ti.innerHTML='<span class="mi mi-sm">search</span>チェック結果';co.innerHTML='<div class="proof-summary">'+(document.getElementById('proofSum')?.innerHTML||'')+'</div><div class="output-area" style="min-height:200px;margin-top:12px;line-height:2.2">'+(document.getElementById('proofText')?.innerHTML||'')+'</div>';}
  document.getElementById('mOvl').classList.add('show');document.body.style.overflow='hidden';
}
function closeMod(){document.getElementById('mOvl').classList.remove('show');document.body.style.overflow='';}
function upCt(){document.getElementById('srcCount').textContent=document.getElementById('srcEditor').value.length.toLocaleString();document.getElementById('outCount').textContent=fmt.length.toLocaleString();}

// Format
function fmtT(t){
  const oA=document.getElementById('optAlpha').value,oN=document.getElementById('optNum').value,oS=document.getElementById('optSym').value;
  if(oA==='full')t=t.replace(/[A-Za-z]/g,c=>String.fromCharCode(c.charCodeAt(0)+0xFEE0));
  if(oA==='half')t=t.replace(/[Ａ-Ｚａ-ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  if(oN==='full')t=t.replace(/[0-9]/g,c=>String.fromCharCode(c.charCodeAt(0)+0xFEE0));
  if(oN==='half')t=t.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  if(oS==='full'){t=t.replace(/([!?]{2,})/g,m=>'__C__'+m+'__C__');t=t.replace(/!/g,'！').replace(/\?/g,'？');t=t.replace(/__C__(.+?)__C__/g,(m,p)=>p.replace(/！/g,'!').replace(/？/g,'?'));}
  if(oS==='half')t=t.replace(/！/g,'!').replace(/？/g,'?');
  if(document.getElementById('optBP').checked)t=t.replace(/。([」』）\]])/g,'$1');
  if(document.getElementById('optLD').checked){t=t.replace(/…{1,}/g,'……');t=t.replace(/\.{3,}/g,'……');t=t.replace(/—{1,}/g,'——');t=t.replace(/ー{2,}/g,'——');}
  if(document.getElementById('optSS').checked)t=t.replace(/([！？]+)(?=[^\s！？」』）\]\n])/g,'$1　');
  rubyRules.forEach(([k,r])=>{t=t.replace(new RegExp(eR(k),'g'),'|'+k+'《'+r+'》');});
  const ls=t.split('\n'),res=[];
  for(let i=0;i<ls.length;i++){let l=ls[i];
    if(document.getElementById('optSB').checked&&/^[\s]*[＊\*✳☆★◇◆◎○●▽△▼▲♦♢♣♠♡♥※＃#─━═]+[\s]*$/.test(l)&&l.trim().length>0){if(res.length>0&&res[res.length-1].trim()!=='')res.push('');res.push(l);if(i+1<ls.length&&ls[i+1].trim()!=='')res.push('');continue;}
    if(document.getElementById('optIndent').checked&&l.trim().length>0&&!/^[\s　「『（【]/.test(l))l='　'+l;
    res.push(l);}
  return res.join('\n');
}
function upPrev(){fmt=fmtT(document.getElementById('srcEditor').value);const e=document.getElementById('outPrev');if(e)e.textContent=fmt;upCt();}
function applyToSrc(){document.getElementById('srcEditor').value=fmt;upPrev();toast('原文に反映しました');}
function formatDirect(){document.getElementById('srcEditor').value=fmtT(document.getElementById('srcEditor').value);upPrev();upCt();toast('体裁を整えました');}

// Proofread
function runProof(){
  const text=fmt||document.getElementById('srcEditor').value;
  issues=[];ignored=new Set();
  const sens=+document.getElementById('gobiSens').value;

  // Gobi: check consecutive sentences (地の文のみ、段落内で連続するもの)
  // 段落ごとにリセットして判定する
  const paragraphs=text.split(/\n\n+/);
  paragraphs.forEach(para=>{
    const paraLines=para.split('\n');
    const paraSents=[];
    paraLines.forEach(line=>{
      const trimmed=line.trim();
      if(!trimmed)return;
      if(/^[「『]/.test(trimmed))return;
      const parts=trimmed.split(/(?<=[。！？])/);
      parts.forEach(p=>{
        const s=p.trim();
        if(s.length>=2){
          if(/^[「『]/.test(s))return;
          const body=s.replace(/[。！？]+$/,'');
          if(body.length>=1)paraSents.push({ending:body.slice(-1),text:s,snippet:body.slice(-8)});
        }
      });
      if(!parts.some(p=>/[。！？]/.test(p))&&trimmed.length>=2&&!/^[「『]/.test(trimmed)){
        paraSents.push({ending:trimmed.slice(-1),text:trimmed,snippet:trimmed.slice(-8)});
      }
    });
    // 段落内で連続チェック
    for(let i=0;i<=paraSents.length-sens;i++){
      let consecutive=true;
      for(let j=1;j<sens;j++){if(paraSents[i+j].ending!==paraSents[i].ending){consecutive=false;break;}}
      if(consecutive){
        let c=sens;while(i+c<paraSents.length&&paraSents[i+c].ending===paraSents[i].ending)c++;
        const snippets=paraSents.slice(i,i+c).map(s=>s.snippet);
        issues.push({type:'gobi',ending:paraSents[i].ending,count:c,message:'「'+paraSents[i].ending+'」が'+c+'文連続',snippets:snippets});
        i+=c-1;
      }
    }
  });

  // Yure
  yureRules.forEach(([a,b])=>{
    if(text.includes(a)&&text.includes(b)){
      const getOccurrences=(w)=>{const re=new RegExp(eR(w),'g');const res=[];let m;while((m=re.exec(text))!==null)res.push(m.index);return res;};
      const posA=getOccurrences(a),posB=getOccurrences(b);
      const mkSnips=(positions,w)=>positions.map(idx=>({pos:idx,word:w,ctx:text.slice(Math.max(0,idx-12),idx)+'【'+w+'】'+text.slice(idx+w.length,idx+w.length+12)}));
      issues.push({type:'yure',wordA:a,wordB:b,countA:posA.length,countB:posB.length,
        snippetsA:mkSnips(posA,a),snippetsB:mkSnips(posB,b),
        message:'「'+a+'」('+posA.length+') と「'+b+'」('+posB.length+') が混在'});
    }
  });

  // NG list: distance-based (直近X字以内に再登場したら警告)
  const ngDist=+document.getElementById('ngDist').value;
  ngRules.forEach(r=>{
    const w=typeof r==='string'?r:(r.w||r);
    const re=new RegExp(eR(w),'g');
    const positions=[];let m;
    while((m=re.exec(text))!==null)positions.push(m.index);
    if(positions.length===0)return;
    const pairs=[];
    for(let i=1;i<positions.length;i++){
      const dist=positions[i]-positions[i-1];
      if(dist<=ngDist)pairs.push({from:positions[i-1],to:positions[i],dist:dist});
    }
    if(pairs.length===0)return;
    const minDist=Math.min(...pairs.map(p=>p.dist));
    // ペアごとにスニペット生成（from側とto側）
    const pairSnips=pairs.map(p=>({
      from:p.from,to:p.to,dist:p.dist,
      ctxFrom:text.slice(Math.max(0,p.from-10),p.from)+'【'+w+'】'+text.slice(p.from+w.length,p.from+w.length+10),
      ctxTo:text.slice(Math.max(0,p.to-10),p.to)+'【'+w+'】'+text.slice(p.to+w.length,p.to+w.length+10)
    }));
    issues.push({type:'ng',word:w,count:positions.length,pairs:pairs,pairSnips:pairSnips,message:'「'+w+'」… 直近'+minDist.toLocaleString()+'字以内に再登場（計'+positions.length+'回）'});
  });

  renderProof(text);
}

function renderProof(text){
  const sum=document.getElementById('proofSum'),tEl=document.getElementById('proofText');
  if(!issues.length){sum.style.display='block';sum.innerHTML='<p style="color:var(--success);font-weight:500;display:flex;align-items:center;gap:6px"><span class="mi mi-sm">check_circle</span>問題なし！</p>';tEl.style.display='none';return;}

  // Count by type
  const gobiCt=issues.filter(i=>i.type==='gobi'&&!isIg(i)).length;
  const yureCt=issues.filter(i=>i.type==='yure'&&!isIg(i)).length;
  const ngCt=issues.filter(i=>i.type==='ng'&&!isIg(i)).length;

  let h='<div class="proof-badges">';
  if(gobiCt)h+='<span class="proof-badge gobi">語尾 '+gobiCt+'件</span>';
  if(yureCt)h+='<span class="proof-badge yure">表記ゆれ '+yureCt+'件</span>';
  if(ngCt)h+='<span class="proof-badge ng">NG '+ngCt+'件</span>';
  h+='</div>';
  h+='<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-secondary btn-sm" onclick="resetIg()"><span class="mi mi-xs">refresh</span>無視リセット</button></div>';

  issues.forEach((is,i)=>{
    const ig=isIg(is);
    const hasSnips=!ig&&((is.type==='yure'&&(is.snippetsA||is.snippetsB))||(is.type==='ng'&&is.pairSnips));
    // 項目タップ：スニペットあり→展開/折りたたみ、なし→ジャンプ
    const clickAct=hasSnips?'togSnip('+i+')':'jumpTo('+i+')';
    h+='<div class="proof-item'+(ig?' ignored':'')+'" id="pi-'+i+'" onclick="'+clickAct+'" style="flex-wrap:wrap;cursor:'+(ig?'default':'pointer')+'">';
    h+='<span class="proof-tag '+is.type+'">'+(({gobi:'語尾',yure:'表記ゆれ',ng:'NG'})[is.type])+'</span>';
    h+='<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis">'+is.message+'</span>';
    h+='<span class="proof-actions">';
    if(hasSnips){
      h+='<span class="mi" id="pi-chev-'+i+'" style="font-size:16px;color:var(--text3);transition:transform .2s">expand_more</span>';
    }
    if(ig){
      h+='<button class="btn-icon" title="復元" onclick="event.stopPropagation();igIssue('+i+')" style="color:var(--text3)"><span class="mi" style="font-size:14px">visibility</span></button>';
    }else{
      h+='<button class="btn-icon" title="無視" onclick="event.stopPropagation();igIssue('+i+')"><span class="mi" style="font-size:14px">visibility_off</span></button>';
    }
    h+='</span>';
    if(hasSnips){
      h+='<div class="proof-snippets" id="pi-snip-'+i+'" style="width:100%;display:none">';
      if(is.type==='yure'){
        [...(is.snippetsA||[]),...(is.snippetsB||[])].forEach(s=>{
          const ctx=eH(s.ctx).replace('【'+eH(s.word)+'】','<mark>'+eH(s.word)+'</mark>');
          h+='<div class="proof-snippet" onclick="event.stopPropagation();snipEditPop(event,this,\''+eH(s.word)+'\','+s.pos+','+i+')" title="タップして編集">…'+ctx+'…</div>';
        });
      }else if(is.type==='ng'){
        is.pairSnips.forEach(ps=>{
          const cF=eH(ps.ctxFrom).replace('【'+eH(is.word)+'】','<mark>'+eH(is.word)+'</mark>');
          const cT=eH(ps.ctxTo).replace('【'+eH(is.word)+'】','<mark>'+eH(is.word)+'</mark>');
          h+='<div class="proof-snippet ng-snip" onclick="event.stopPropagation();snipEditPop(event,this,\''+eH(is.word)+'\','+ps.from+','+i+')" title="タップして編集">…'+cF+'…</div>';
          h+='<div class="proof-snippet ng-snip" onclick="event.stopPropagation();snipEditPop(event,this,\''+eH(is.word)+'\','+ps.to+','+i+')" title="タップして編集（'+ps.dist+'字後）">↳ '+ps.dist+'字後　…'+cT+'…</div>';
        });
      }
      h+='</div>';
    }
    h+='</div>';
  });
  sum.innerHTML=h;sum.style.display='block';

  // Highlighted text: プレースホルダ方式でspanを安全に埋め込む
  // 1) マーク位置を収集
  const marks=[];
  issues.forEach((is,i)=>{
    if(isIg(is))return;
    if(is.type==='yure'){
      [is.wordA,is.wordB].forEach(w=>{
        const alt=w===is.wordA?is.wordB:is.wordA;
        let idx=0;while((idx=text.indexOf(w,idx))>=0){marks.push({start:idx,end:idx+w.length,cls:'hl-yure',di:i,w:w,alt:alt});idx+=w.length;}
      });
    }else if(is.type==='gobi'&&is.snippets){
      is.snippets.forEach(sn=>{let idx=0;while((idx=text.indexOf(sn,idx))>=0){marks.push({start:idx,end:idx+sn.length,cls:'hl-gobi',di:i});idx+=sn.length;}});
    }else if(is.type==='ng'&&is.pairs){
      // 近すぎるペアに関わる位置だけをハイライト
      const hlPos=new Set();
      is.pairs.forEach(p=>{hlPos.add(p.from);hlPos.add(p.to);});
      hlPos.forEach(idx=>{marks.push({start:idx,end:idx+is.word.length,cls:'hl-ng',di:i});});
    }
  });
  // 2) 位置順にソート（重複しないよう先勝ち）
  marks.sort((a,b)=>a.start-b.start);
  // 3) テキストをチャンクに分割してHTMLを組み立て
  let html='',pos=0;
  marks.forEach(m=>{
    if(m.start<pos)return; // 重複スキップ
    html+=eH(text.slice(pos,m.start));
    const inner=eH(text.slice(m.start,m.end));
    if(m.cls==='hl-yure'){
      html+='<span class="hl-yure" data-i="'+m.di+'" data-pos="'+m.start+'" data-w="'+eH(m.w)+'" data-alt="'+eH(m.alt)+'" onclick="sPop(event,this)">'+inner+'</span>';
    }else if(m.cls==='hl-gobi'){
      html+='<span class="hl-gobi" data-i="'+m.di+'" data-pos="'+m.start+'">'+inner+'</span>';
    }else{
      html+='<span class="hl-ng" data-i="'+m.di+'" data-pos="'+m.start+'" data-w="'+eH(text.slice(m.start,m.end))+'" onclick="nPop(event,this)">'+inner+'</span>';
    }
    pos=m.end;
  });
  html+=eH(text.slice(pos));
  tEl.innerHTML=html;tEl.style.display='block';
}

function isIg(is){return ignored.has(is.type+'|'+(is.wordA||is.word||is.ending||''));}
function igIssue(i){
  const is=issues[i];
  const key=is.type+'|'+(is.wordA||is.word||is.ending||'');
  if(ignored.has(key)){ignored.delete(key);toast('復元しました');}
  else{ignored.add(key);toast('無視しました');}
  renderProof(fmt||document.getElementById('srcEditor').value);
}
function resetIg(){ignored=new Set();renderProof(fmt||document.getElementById('srcEditor').value);toast('リセットしました');}
function jumpTo(i){const el=document.querySelector('[data-i="'+i+'"]');if(el){el.scrollIntoView({behavior:'smooth',block:'center'});hlEl(el);}}
function jumpToPos(pos,di){
  // data-i と data-pos が一致するspanを探す、なければdata-iで最初のものへ
  const tEl=document.getElementById('proofText');
  if(!tEl)return;
  const spans=tEl.querySelectorAll('[data-i="'+di+'"]');
  // spanのテキスト位置を逆算して最も近いものを選ぶ
  let best=null,bestDist=Infinity;
  spans.forEach(s=>{
    const sp=+s.dataset.pos;
    if(!isNaN(sp)){const d=Math.abs(sp-pos);if(d<bestDist){bestDist=d;best=s;}}
  });
  const target=best||spans[0];
  if(target){target.scrollIntoView({behavior:'smooth',block:'center'});hlEl(target);}
}
function togSnip(i){
  const snip=document.getElementById('pi-snip-'+i);
  const chev=document.getElementById('pi-chev-'+i);
  if(!snip)return;
  const open=snip.style.display==='none';
  snip.style.display=open?'flex':'none';
  if(chev)chev.style.transform=open?'rotate(180deg)':'';
}
function hlEl(el){el.style.outline='3px solid var(--primary)';el.style.outlineOffset='2px';setTimeout(()=>{el.style.outline='';el.style.outlineOffset='';},2000);}

// Yure popup
function sPop(e,el){
  e.stopPropagation();const p=document.getElementById('yPop'),w=el.dataset.w,alt=el.dataset.alt,di=+el.dataset.i;
  p.innerHTML='<div class="yure-popup-title">「'+w+'」をどうしますか？</div><button class="btn btn-primary btn-sm" onclick="repW(this)" data-from="'+eH(w)+'" data-to="'+eH(alt)+'"><span class="mi mi-xs">swap_horiz</span>全て「'+alt+'」に変更</button><button class="btn btn-secondary btn-sm" onclick="hPop();igIssue('+di+')"><span class="mi mi-xs">check</span>このまま（無視）</button>';
  showPop(p,el);
}

// スニペットクリック：その1箇所だけ編集
function snipEditPop(e,el,word,pos,di){
  e.stopPropagation();
  const p=document.getElementById('yPop');
  const src=document.getElementById('srcEditor').value;
  // fmtとsrcの位置ずれがある可能性があるため、src上で該当語を探す
  const ctx='…'+eH(src.slice(Math.max(0,pos-12),pos))+'<mark>'+eH(word)+'</mark>'+eH(src.slice(pos+word.length,pos+word.length+12))+'…';
  p.innerHTML='<div class="yure-popup-title" style="font-family:var(--font-mincho);font-size:12px;margin-bottom:8px;line-height:1.8">'+ctx+'</div>'
    +'<div style="margin-bottom:8px;display:flex;gap:6px;align-items:center">'
    +'<input class="input-text" id="snipEditVal" value="'+eH(word)+'" style="flex:1;font-size:13px">'
    +'<button class="btn btn-primary btn-sm" onclick="snipEdit(\''+eH(word)+'\','+pos+','+di+')"><span class="mi mi-xs">edit</span>この1箇所</button>'
    +'</div>'
    +'<button class="btn btn-secondary btn-sm" style="width:100%;margin-bottom:6px" onclick="snipEditAll(\''+eH(word)+'\','+di+')"><span class="mi mi-xs">swap_horiz</span>全件変更</button>'
    +'<button class="btn btn-secondary btn-sm" style="width:100%" onclick="hPop()"><span class="mi mi-xs">check</span>閉じる</button>';
  showPop(p,el);
  setTimeout(()=>{const inp=document.getElementById('snipEditVal');if(inp){inp.focus();inp.select();}},50);
}
function snipEdit(word,pos,di){
  const to=document.getElementById('snipEditVal').value.trim();
  if(!to||to===word){hPop();return;}
  hPop();
  const s=document.getElementById('srcEditor');
  // pos位置のwordだけ置換
  if(s.value.slice(pos,pos+word.length)===word){
    s.value=s.value.slice(0,pos)+to+s.value.slice(pos+word.length);
    upPrev();upCt();toast('1箇所を「'+to+'」に変更');runProof();
  }else{
    toast('位置がずれています。全件変更をお試しください');
  }
}
function snipEditAll(word,di){
  const to=document.getElementById('snipEditVal').value.trim();
  if(!to||to===word){hPop();return;}
  hPop();
  const s=document.getElementById('srcEditor');
  s.value=s.value.split(word).join(to);
  upPrev();upCt();toast('「'+word+'」→「'+to+'」（全件）');runProof();
}
// NG popup (テキスト上のハイライトをクリック)
function nPop(e,el){
  e.stopPropagation();const p=document.getElementById('yPop'),w=el.dataset.w,di=+el.dataset.i,pos=+el.dataset.pos;
  snipEditPop(e,el,w,pos,di);
}

function showPop(p,el){
  p.style.display='block';p.style.left='0';p.style.top='0';
  const r=el.getBoundingClientRect(),pw=p.offsetWidth,ph2=p.offsetHeight;
  let left=r.left,top=r.bottom+8;
  if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  if(left<8)left=8;
  if(top+ph2>window.innerHeight-8)top=r.top-ph2-8;
  if(top<8)top=8;
  p.style.left=left+'px';p.style.top=top+'px';
}
function hPop(){document.getElementById('yPop').style.display='none';}
function repW(btn){
  const from=btn.dataset.from,to=btn.dataset.to;hPop();
  const s=document.getElementById('srcEditor');
  // 全箇所を一括置換
  const newVal=s.value.split(from).join(to);
  if(newVal!==s.value){s.value=newVal;upPrev();upCt();toast('「'+from+'」→「'+to+'」（全件置換）');runProof();}
}

// Rules
function rYure(){document.getElementById('yureList').innerHTML=yureRules.map((r,i)=>'<div class="rule-row"><input class="input-text" value="'+eH(r[0])+'" onchange="yureRules['+i+'][0]=this.value;sj(\'novelcraft_yure\',yureRules)"><span style="color:var(--text3);flex-shrink:0">↔</span><input class="input-text" value="'+eH(r[1])+'" onchange="yureRules['+i+'][1]=this.value;sj(\'novelcraft_yure\',yureRules)"><button class="btn-icon" onclick="yureRules.splice('+i+',1);rYure();sj(\'novelcraft_yure\',yureRules)"><span class="mi" style="font-size:14px">close</span></button></div>').join('');document.getElementById('yureCt').textContent=yureRules.length;}
function addYure(){const a=document.getElementById('yA').value.trim(),b=document.getElementById('yB').value.trim();if(a&&b){yureRules.push([a,b]);document.getElementById('yA').value='';document.getElementById('yB').value='';rYure();sj('novelcraft_yure',yureRules);}}

function rNg(){
  document.getElementById('ngList').innerHTML=ngRules.map((r,i)=>{
    const w=typeof r==='string'?r:(r.w||r);
    return '<div class="rule-row"><input class="input-text" value="'+eH(w)+'" onchange="ngRules['+i+']=this.value;sj(\'novelcraft_ng\',ngRules)"><button class="btn-icon" onclick="ngRules.splice('+i+',1);rNg();sj(\'novelcraft_ng\',ngRules)"><span class="mi" style="font-size:14px">close</span></button></div>';
  }).join('');
  document.getElementById('ngCt').textContent=ngRules.length;
}
function addNg(){const w=document.getElementById('ngW').value.trim();if(w){ngRules.push(w);document.getElementById('ngW').value='';rNg();sj('novelcraft_ng',ngRules);}}

function rRuby(){document.getElementById('rubyList').innerHTML=rubyRules.map((r,i)=>'<div class="rule-row"><input class="input-text" value="'+eH(r[0])+'" onchange="rubyRules['+i+'][0]=this.value;sj(\'novelcraft_ruby\',rubyRules);upPrev()"><span style="color:var(--text3);flex-shrink:0">→</span><input class="input-text" value="'+eH(r[1])+'" onchange="rubyRules['+i+'][1]=this.value;sj(\'novelcraft_ruby\',rubyRules);upPrev()"><button class="btn-icon" onclick="rubyRules.splice('+i+',1);rRuby();sj(\'novelcraft_ruby\',rubyRules);upPrev()"><span class="mi" style="font-size:14px">close</span></button></div>').join('');}
function addRuby(){const k=document.getElementById('rubyK').value.trim(),r=document.getElementById('rubyR').value.trim();if(k&&r){rubyRules.push([k,r]);document.getElementById('rubyK').value='';document.getElementById('rubyR').value='';rRuby();sj('novelcraft_ruby',rubyRules);upPrev();}}
function sj(k,v){localStorage.setItem(k,JSON.stringify(v));}

// Split
function setSM(m,b){splitMode=m;document.querySelectorAll('.split-mode-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('spCntF').style.display=m==='count'?'':'none';document.getElementById('spChrF').style.display=m==='chars'?'':'none';}
function endsDlg(t){const ls=t.split('\n');for(let i=ls.length-1;i>=0;i--){const l=ls[i].trim();if(!l)continue;return /^[「『]/.test(l)||/[」』]$/.test(l);}return false;}
function runSplit(){
  const t=fmt||document.getElementById('srcEditor').value;if(!t.trim()){toast('テキストがありません');return;}
  let sc;if(splitMode==='chars'){sc=Math.max(2,Math.ceil(t.length/(+document.getElementById('spChr').value||1500)));}else{sc=+document.getElementById('spCnt').value||2;}
  const pa=t.split(/\n\n+/),tgt=Math.ceil(t.length/sc),pts=[];let cur=[],cl=0;
  for(let i=0;i<pa.length;i++){cur.push(pa[i]);cl+=pa[i].length;if(cl>=tgt&&pts.length<sc-1){const j=cur.join('\n\n');if(endsDlg(j)&&i+1<pa.length)continue;pts.push(j);cur=[];cl=0;}}
  if(cur.length)pts.push(cur.join('\n\n'));
  document.getElementById('spRes').innerHTML=pts.map((p,i)=>{
    const H=300,T=200;let ph;
    if(p.length<=H+T+50){ph='<pre>'+eH(p)+'</pre>';}
    else{
      // 先頭: 300字以降で最初の。まで
      let headEnd=H;
      const headSearch=p.indexOf('。',H);
      if(headSearch>=0&&headSearch<H+100)headEnd=headSearch+1;
      // 末尾: 末尾200字より前で最初の。から
      let tailStart=p.length-T;
      const tailSearch=p.lastIndexOf('。',tailStart);
      if(tailSearch>=0&&tailSearch>p.length-T-100)tailStart=tailSearch+1;
      const omit=tailStart-headEnd;
      ph='<pre><span class="split-label">▼ 先頭</span>\n'+eH(p.slice(0,headEnd))+'</pre><div class="split-ellipsis">… 省略（'+omit.toLocaleString()+'字） …</div><pre><span class="split-label">▼ 末尾</span>\n'+eH(p.slice(tailStart))+'</pre>';
    }
    return '<div class="split-card"><div class="split-card-header"><h4>パート '+(i+1)+'/'+pts.length+'</h4><span>'+p.length.toLocaleString()+' 文字</span></div>'+ph+'<div class="btn-bar"><button class="btn btn-secondary btn-sm" onclick="cpSP('+i+')"><span class="mi mi-xs">content_copy</span>コピー</button><button class="btn btn-secondary btn-sm" onclick="exSP('+i+')"><span class="mi mi-xs">download</span>TXT</button></div></div>';
  }).join('');
  window._sp=pts;
}
function cpSP(i){if(window._sp?.[i]){navigator.clipboard.writeText(window._sp[i]);toast('パート'+(i+1)+'コピー');}}
function exSP(i){if(window._sp?.[i])dl(window._sp[i],'part'+(i+1)+'.txt');}

function doSave(){localStorage.setItem('novelcraft_src',document.getElementById('srcEditor').value);toast('保存しました');}
function expTxt(m){dl(m==='src'?document.getElementById('srcEditor').value:fmt,m==='src'?'source.txt':'formatted.txt');}
function dl(t,f){const b=new Blob([t],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f;a.click();URL.revokeObjectURL(a.href);toast(f);}
function loadF(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('srcEditor').value=ev.target.result;upPrev();upCt();toast(f.name);};r.readAsText(f);e.target.value='';}
function cpOut(){navigator.clipboard.writeText(fmt);toast('コピー');}

function eH(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eR(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function toast(m){const e=document.getElementById('toast');e.innerHTML='<span class="mi" style="font-size:16px">check_circle</span>'+m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
</script>
