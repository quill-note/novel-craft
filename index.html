<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>執筆補助</title>
<meta name="theme-color" content="#e87b6b">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#e87b6b;--primary-dark:#c9584a;--primary-light:#f5a99e;--primary-pale:#fdf0ee;--bg:#fef8f7;--surface:#fff;--border:#f0d5d1;--text:#4a2525;--text2:#7a4545;--text3:#aa7777;--success:#4a9e6e;--warn:#c48a2a;--warnbg:#fef9eb;--info:#5b8fd4;--info-pale:#eaf1fb;--shadow:rgba(232,123,107,.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-mincho:'Zen Old Mincho',serif;--tr:.2s ease}
.mi{font-family:'Material Icons Round';font-style:normal;font-size:20px;line-height:1;vertical-align:middle;user-select:none}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header h1{font-size:18px;font-weight:700;color:var(--primary-dark);display:flex;align-items:center;gap:8px}
.char-counts{display:flex;gap:12px;font-size:12px;color:var(--text2)}
.char-counts span{background:var(--primary-pale);padding:4px 12px;border-radius:20px}
.tab-nav{max-width:1200px;margin:0 auto;padding:12px 24px 0;display:flex;gap:4px;overflow-x:auto}
.tab-btn{font-size:13px;padding:10px 18px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:var(--radius-md) var(--radius-md) 0 0;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab-btn.active{background:var(--surface);color:var(--primary-dark);box-shadow:0 1px 6px var(--shadow);font-weight:700}
.main{max-width:1200px;margin:0 auto;padding:0 24px 40px}
.tab-panel{display:none;background:var(--surface);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);box-shadow:0 1px 6px var(--shadow);padding:24px}
.tab-panel.active{display:block}
.editor-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
textarea,.output-area{width:100%;min-height:450px;padding:16px;font-family:var(--font-mincho);font-size:15px;line-height:2.2;border:1.5px solid var(--border);border-radius:var(--radius-md);background:var(--surface);color:var(--text)}
.output-area{background:var(--bg);overflow-y:auto;white-space:pre-wrap;word-wrap:break-word}
.settings-panel{margin-bottom:16px}.settings-body{display:none;margin-top:12px;padding:20px;background:var(--bg);border-radius:var(--radius-md);border:1px solid var(--border)}.settings-body.open{display:block}
.btn{font-size:13px;font-weight:500;padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:var(--tr)}
.btn-primary{background:var(--primary);color:#fff}.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.hl-yure{background:rgba(196,138,42,.2);border-bottom:2px solid var(--warn);cursor:pointer}
.hl-gobi{background:rgba(232,123,107,.2);border-bottom:2px solid var(--primary);cursor:pointer}
.hl-ng{background:rgba(91,143,212,.2);border-bottom:2px solid var(--info);cursor:pointer}
.hl-freq{background:rgba(164,91,212,.2);border-bottom:2px solid #9b59b6;cursor:pointer}
.yure-popup{position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:0 4px 16px var(--shadow);padding:12px;min-width:230px;font-size:13px}
.proof-item{padding:8px;border-bottom:1px solid var(--primary-pale);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px}
.proof-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0}
.proof-tag.gobi{background:var(--primary-pale);color:var(--primary-dark)}
.proof-tag.yure{background:var(--warnbg);color:var(--warn)}
.input-text{font-size:13px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);width:100%;margin-bottom:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;transition:var(--tr);opacity:0;z-index:600}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:768px){.editor-layout{grid-template-columns:1fr}.desktop-only{display:none}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><h1><span class="mi">edit_note</span>執筆補助</h1><div class="char-counts"><span>原文: <strong id="srcCount">0</strong></span><span>完成版: <strong id="outCount">0</strong></span></div></div></header>
<nav class="tab-nav"><button class="tab-btn active" data-tab="editor"><span class="mi">edit</span>エディタ</button><button class="tab-btn" data-tab="proofread"><span class="mi">search</span>推敲</button><button class="tab-btn" data-tab="split"><span class="mi">content_cut</span>分割</button></nav>
<main class="main">
<section class="tab-panel active" id="panel-editor">
<div class="settings-panel"><button class="btn btn-secondary" onclick="document.getElementById('sBody').classList.toggle('open')"><span class="mi">settings</span>設定</button>
<div class="settings-body" id="sBody">
<label><input type="checkbox" id="optIndent" checked> 行頭字下げ</label><br>
<label><input type="checkbox" id="optBracket" checked> 」前の句点削除</label><br>
<label><input type="checkbox" id="optSpace" checked> ！？後の空白</label>
</div></div>
<div class="editor-layout">
<div class="editor-col"><h3>原文</h3><textarea id="srcEditor" placeholder="貼り付けてください..."></textarea>
<div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-primary" onclick="formatDirect()">整える</button><button class="btn btn-secondary" onclick="save()">保存</button></div></div>
<div class="editor-col desktop-only"><h3>完成版</h3><div class="output-area" id="outPrev"></div></div>
</div></section>
<section class="tab-panel" id="panel-proofread">
<div style="margin-bottom:15px;display:flex;gap:15px;font-size:13px">
<div>語尾：<select id="gobiSens"><option value="2">2回</option><option value="3" selected>3回</option></select></div>
<div>多用：<select id="freqThresh"><option value="3">3回以上</option><option value="5" selected>5回以上</option></select></div>
</div>
<button class="btn btn-primary" onclick="runProof()">チェック実行</button>
<div id="proofSum" class="output-area" style="min-height:100px;margin-top:15px;display:none;height:auto"></div>
<div id="proofText" class="output-area" style="margin-top:10px;display:none"></div>
</section>
<section class="tab-panel" id="panel-split">
<div style="margin-bottom:15px"><label>分割数：<input type="number" id="spCnt" value="2" min="2" style="width:50px"></label> <button class="btn btn-primary" onclick="runSplit()">分割実行</button></div>
<div id="spRes"></div>
</section>
</main>
<div class="yure-popup" id="yPop" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
let fmt='', issues=[];
document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn,.tab-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); document.getElementById('panel-'+b.dataset.tab).classList.add('active');
  });
});

const src=document.getElementById('srcEditor');
src.addEventListener('input',()=>{upPrev();upCt();});
window.onload=()=>{const s=localStorage.getItem('novelcraft_src');if(s){src.value=s;upPrev();upCt();}};

function upPrev(){
  let t=src.value;
  if(document.getElementById('optBracket').checked) t=t.replace(/。([」』])/g,'$1');
  if(document.getElementById('optSpace').checked) t=t.replace(/([！？]+)(?=[^\s！？」』\n])/g,'$1　');
  fmt=t.split('\n').map(l=>{
    if(document.getElementById('optIndent').checked && l.trim() && !/^[　「『（]/.test(l)) return '　'+l;
    return l;
  }).join('\n');
  document.getElementById('outPrev').textContent=fmt;
}
function upCt(){document.getElementById('srcCount').textContent=src.value.length;document.getElementById('outCount').textContent=fmt.length;}
function formatDirect(){src.value=fmt;upPrev();toast('原文に反映しました');}
function save(){localStorage.setItem('novelcraft_src',src.value);toast('保存しました');}

// --- 推敲ロジック ---
function runProof(){
  const text=fmt||src.value; issues=[];
  const sens=+document.getElementById('gobiSens').value, freqT=+document.getElementById('freqThresh').value;

  // 1. 語尾（段落内リセット）
  text.split('\n').forEach(para=>{
    if(!para.trim())return;
    const sents=para.split(/([。！？…」』])/).filter(s=>s.trim());
    let ps=[]; for(let i=0;i<sents.length;i++){
      if(/[。！？…」』]/.test(sents[i])&&ps.length>0) ps[ps.length-1]+=sents[i]; else ps.push(sents[i]);
    }
    for(let i=0;i<=ps.length-sens;i++){
      const getE=(s)=>s.replace(/[「」『』。！？…―\s]/g,'').slice(-2);
      const target=getE(ps[i]); if(target.length<2)continue;
      let c=1; for(let j=i+1;j<ps.length;j++){if(getE(ps[j])===target)c++; else break;}
      if(c>=sens){issues.push({type:'gobi',word:target,msg:`「${target}」が${c}回連続`}); i+=c-1;}
    }
  });

  // 2. 多用（ひらがな3文字無視）
  const words3={}; const chars=text.replace(/[\s\n「」『』（）、。！？…―─\-]/g,'');
  for(let i=0;i<=chars.length-3;i++){
    const w=chars.substring(i,i+3);
    if(/^[ぁ-ん]{3}$/.test(w))continue;
    words3[w]=(words3[w]||0)+1;
  }
  Object.entries(words3).filter(([w,c])=>c>=freqT).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([w,c])=>{
    issues.push({type:'freq',word:w,msg:`「${w}」が${c}回`});
  });

  renderProof(text);
}

function renderProof(text){
  const sum=document.getElementById('proofSum'), tEl=document.getElementById('proofText');
  sum.innerHTML=issues.map((is,i)=>`<div class="proof-item" onclick="jumpTo(${i})"><span class="proof-tag ${is.type}">${is.type}</span>${is.msg}</div>`).join('')||'指摘なし';
  sum.style.display='block';

  // タグが漏れないよう一括置換ではなく、安全にHTMLを組み立て
  let html=eH(text);
  const sortedIssues = [...issues].sort((a,b)=>b.word.length - a.word.length);
  sortedIssues.forEach(is=>{
    const reg=new RegExp(eR(is.word),'g');
    html=html.replace(reg,`<span class="hl-${is.type}" data-w="${eH(is.word)}" onclick="sPop(event,this)">${eH(is.word)}</span>`);
  });
  tEl.innerHTML=html; tEl.style.display='block';
}

function sPop(e,el){
  e.stopPropagation(); const p=document.getElementById('yPop');
  const w=el.dataset.w;
  p.innerHTML=`<div style="font-size:11px;color:#999;margin-bottom:5px">「${eH(w)}」を書き換え</div>
    <input type="text" id="popIn" class="input-text" value="${eH(w)}">
    <button class="btn btn-primary btn-sm" onclick="repWord('${eH(w).replace(/'/g,"\\'")}',document.getElementById('popIn').value)">反映</button>
    <button class="btn btn-secondary btn-sm" onclick="hPop()">閉じる</button>`;
  p.style.display='block';
  p.style.left=Math.min(e.pageX, window.innerWidth-250)+'px';
  p.style.top=(e.pageY+10)+'px';
}
function hPop(){document.getElementById('yPop').style.display='none';}
function repWord(f,t){
  src.value=src.value.replace(new RegExp(eR(f),'g'),t);
  upPrev(); hPop(); runProof(); toast('修正しました');
}
function jumpTo(i){
  const target=issues[i].word;
  const el=[...document.querySelectorAll('[data-w]')].find(x=>x.innerText===target);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

// --- 分割ロジック ---
function runSplit(){
  const t=fmt||src.value; const sc=+document.getElementById('spCnt').value;
  const size=Math.ceil(t.length/sc); const res=[];
  for(let i=0;i<sc;i++) res.push(t.substring(i*size,(i+1)*size));
  document.getElementById('spRes').innerHTML=res.map((p,i)=>`<div style="margin-bottom:10px;padding:10px;background:#fff;border:1px solid var(--border);border-radius:8px"><strong>パート${i+1}</strong> (${p.length}字)<pre style="font-size:12px;white-space:pre-wrap;margin-top:5px;color:#666">${eH(p.substring(0,100))}...</pre><button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText(this.nextSibling.innerText);toast('コピーしました')">コピー</button><span style="display:none">${eH(p)}</span></div>`).join('');
}

function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000);}
function eH(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eR(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
document.addEventListener('click',e=>{if(!e.target.closest('.yure-popup'))hPop();});
</script>
</body>
</html>
