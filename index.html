<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>執筆補助</title>
<meta name="theme-color" content="#e87b6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="執筆補助">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#e87b6b;--primary-dark:#c9584a;--primary-light:#f5a99e;--primary-pale:#fdf0ee;--bg:#fef8f7;--surface:#fff;--border:#f0d5d1;--text:#4a2525;--text2:#7a4545;--text3:#aa7777;--success:#4a9e6e;--warn:#c48a2a;--warnbg:#fef9eb;--info:#5b8fd4;--info-pale:#eaf1fb;--shadow:rgba(232,123,107,.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-mincho:'Zen Old Mincho',serif;--tr:.2s ease}
.mi{font-family:'Material Icons Round';font-style:normal;font-size:20px;line-height:1;vertical-align:middle;user-select:none}.mi-sm{font-size:16px}.mi-xs{font-size:14px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100}.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}.header-title{display:flex;align-items:center;gap:10px}.header-title .mi{font-size:24px;color:var(--primary)}.header h1{font-size:18px;font-weight:700;color:var(--primary-dark)}.char-counts{display:flex;gap:12px;font-size:12px;color:var(--text2)}.char-counts span{background:var(--primary-pale);padding:4px 12px;border-radius:20px}.char-counts strong{color:var(--primary-dark);font-weight:700}
.tab-nav{max-width:1200px;margin:0 auto;padding:12px 24px 0;display:flex;gap:4px}.tab-btn{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;font-weight:500;padding:9px 18px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:var(--radius-md) var(--radius-md) 0 0;transition:var(--tr);display:flex;align-items:center;gap:6px}.tab-btn .mi{font-size:16px}.tab-btn:hover{background:var(--primary-pale);color:var(--primary)}.tab-btn.active{background:var(--surface);color:var(--primary-dark);box-shadow:0 1px 6px var(--shadow);font-weight:700}
.main{max-width:1200px;margin:0 auto;padding:0 24px 40px}.tab-panel{display:none;background:var(--surface);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);box-shadow:0 1px 6px var(--shadow);padding:24px;animation:fadeIn .25s ease}.tab-panel.active{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.editor-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}.editor-col h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}.editor-col h3 .badge{font-size:10px;font-weight:500;background:var(--primary-pale);color:var(--primary);padding:2px 8px;border-radius:10px}
textarea,.output-area{width:100%;min-height:420px;padding:16px;font-family:var(--font-mincho);font-size:15px;line-height:2;border:1.5px solid var(--border);border-radius:var(--radius-md);resize:vertical;transition:var(--tr);background:var(--surface);color:var(--text)}textarea:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(232,123,107,.1)}.output-area{background:var(--bg);overflow-y:auto;white-space:pre-wrap;word-wrap:break-word}
.settings-panel{margin-bottom:16px}.settings-toggle{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;font-weight:500;color:var(--text2);background:var(--bg);border:1px solid var(--border);padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:6px}.settings-toggle:hover{border-color:var(--primary-light);color:var(--primary)}.settings-body{display:none;margin-top:12px;padding:20px;background:var(--bg);border-radius:var(--radius-md);border:1px solid var(--border)}.settings-body.open{display:block}
.btn{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:var(--tr);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}.btn .mi{font-size:14px}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark);box-shadow:0 1px 6px var(--shadow)}.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{background:var(--primary-pale);color:var(--primary);border-color:var(--primary-light)}.btn-sm{font-size:12px;padding:6px 12px}.btn-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.btn-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:var(--radius-sm);transition:var(--tr);flex-shrink:0}.btn-icon:hover{color:var(--primary);background:var(--primary-pale)}.btn-icon .mi{font-size:16px}
.hl-yure{background:rgba(196,138,42,.18);border-bottom:2px solid var(--warn);border-radius:2px;cursor:pointer}.hl-gobi{background:rgba(232,123,107,.18);border-bottom:2px solid var(--primary);border-radius:2px;cursor:pointer}.hl-ng{background:rgba(91,143,212,.18);border-bottom:2px solid var(--info);border-radius:2px;cursor:pointer}.hl-freq{background:rgba(164,91,212,.18);border-bottom:2px solid #9b59b6;border-radius:2px;cursor:pointer}
.yure-popup{position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:0 4px 16px var(--shadow);padding:12px;min-width:220px;font-size:13px}.yure-popup-title{font-size:11px;color:var(--text3);margin-bottom:8px}.yure-popup .btn{width:100%;justify-content:center;margin-bottom:6px}
.proof-summary{margin-top:16px;padding:12px 16px;background:var(--bg);border-radius:var(--radius-md);border:1px solid var(--border);font-size:13px;line-height:1.8;max-height:300px;overflow-y:auto}
.proof-item{padding:6px 0;border-bottom:1px solid var(--primary-pale);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px}.proof-item:hover{background:var(--primary-pale);margin:0 -8px;padding:6px 8px;border-radius:var(--radius-sm)}.proof-item.ignored{opacity:.4;text-decoration:line-through}
.proof-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;margin-right:4px;flex-shrink:0}.proof-tag.gobi{background:var(--primary-pale);color:var(--primary-dark)}.proof-tag.yure{background:var(--warnbg);color:var(--warn)}.proof-tag.ng{background:var(--info-pale);color:var(--info)}.proof-tag.freq{background:#f3eafa;color:#9b59b6}
.input-text{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);width:100%;margin-bottom:8px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}.toggle input{display:none}.toggle .slider{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:var(--tr)}.toggle .slider::before{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:var(--surface);border-radius:50%;transition:var(--tr)}.toggle input:checked+.slider{background:var(--primary)}.toggle input:checked+.slider::before{transform:translateX(18px)}
.collapse-toggle{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:12px;font-weight:700;color:var(--primary);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0 0 4px;margin-bottom:10px;border-bottom:1px solid var(--primary-pale);width:100%}.collapse-body{display:none}.collapse-body.open{display:block}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(74,37,37,.35);z-index:500;align-items:flex-end;justify-content:center}.modal-overlay.show{display:flex}.modal-panel{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:20px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;transition:var(--tr);opacity:0;z-index:600;display:flex;align-items:center;gap:8px}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:768px){.editor-layout{grid-template-columns:1fr}.desktop-col{display:none}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><div class="header-title"><span class="mi">edit_note</span><h1>執筆補助</h1></div><div class="char-counts"><span>原文: <strong id="srcCount">0</strong> 文字</span><span>完成版: <strong id="outCount">0</strong> 文字</span></div></div></header>
<nav class="tab-nav" role="tablist"><button class="tab-btn active" data-tab="editor"><span class="mi mi-sm">edit</span>エディタ</button><button class="tab-btn" data-tab="proofread"><span class="mi mi-sm">search</span>推敲チェック</button></nav>
<main class="main">
<section class="tab-panel active" id="panel-editor">
<div class="settings-panel"><button class="settings-toggle" id="sToggle"><span class="mi mi-sm">settings</span>書式設定を開く</button>
<div class="settings-body" id="sBody">
<div class="setting-row"><label>行頭の字下げ</label><div class="toggle"><input type="checkbox" id="optIndent" checked><span class="slider"></span></div></div>
<div class="setting-row"><label>カギ括弧の句点削除</label><div class="toggle"><input type="checkbox" id="optBracketPeriod" checked><span class="slider"></span></div></div>
<div class="setting-row"><label>記号後のスペース</label><div class="toggle"><input type="checkbox" id="optSymSpace" checked><span class="slider"></span></div></div>
</div></div>
<div class="editor-layout">
<div class="editor-col"><h3>原文エディタ</h3><textarea id="srcEditor" placeholder="ここにテキストを貼り付けてください..."></textarea>
<div class="btn-bar"><button class="btn btn-primary btn-sm" onclick="formatDirect()">体裁を整える</button><button class="btn btn-secondary btn-sm" onclick="save()">保存</button></div></div>
<div class="editor-col desktop-col"><h3>完成版</h3><div class="output-area" id="outPrev"></div></div>
</div></section>
<section class="tab-panel" id="panel-proofread">
<div style="margin:16px 0;display:flex;gap:16px">
<div>語尾：<select id="gobiSens"><option value="2">2回</option><option value="3" selected>3回</option></select></div>
<div>多用：<select id="freqThresh"><option value="3">3回以上</option><option value="5" selected>5回以上</option></select></div>
</div>
<button class="btn btn-primary" onclick="runProof()">チェック実行</button>
<div class="proof-summary" id="proofSum" style="display:none"></div>
<div class="output-area" id="proofText" style="display:none;margin-top:12px;line-height:2.2"></div>
</section>
</main>
<div class="modal-overlay" id="mOvl" onclick="if(event.target===this)closeMod()"><div class="modal-panel"><div id="mContent"></div></div></div>
<div class="yure-popup" id="yPop" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
let yureRules=[['ため','為'],['ください','下さい'],['いう','言う']],ngRules=[],fmt='',issues=[],ignored=new Set();

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');document.getElementById('panel-'+b.dataset.tab).classList.add('active');
  }));
  document.getElementById('sToggle').addEventListener('click',()=>{const d=document.getElementById('sBody');d.classList.toggle('open');});
  const s=document.getElementById('srcEditor');
  s.addEventListener('input',()=>{upPrev();upCt();});
  const sv=localStorage.getItem('novelcraft_src');if(sv){s.value=sv;upPrev();upCt();}
  document.addEventListener('click',e=>{if(!e.target.closest('.yure-popup'))hPop();});
});

function upPrev(){
  let t=document.getElementById('srcEditor').value;
  if(document.getElementById('optBracketPeriod').checked)t=t.replace(/。([」』）\]])/g,'$1');
  if(document.getElementById('optSymSpace').checked)t=t.replace(/([！？]+)(?=[^\s！？」』）\]\n])/g,'$1　');
  const ls=t.split('\n'),res=[];
  ls.forEach(l=>{
    if(document.getElementById('optIndent').checked&&l.trim().length>0&&!/^[\s　「『（【]/.test(l))l='　'+l;
    res.push(l);
  });
  fmt=res.join('\n');
  const e=document.getElementById('outPrev');if(e)e.textContent=fmt;
}
function upCt(){document.getElementById('srcCount').textContent=document.getElementById('srcEditor').value.length;document.getElementById('outCount').textContent=fmt.length;}

// 推敲チェック
function runProof(){
  const text=fmt||document.getElementById('srcEditor').value;
  issues=[];ignored=new Set();
  const sens=+document.getElementById('gobiSens').value,freqT=+document.getElementById('freqThresh').value;

  // 1. 語尾（段落ごとにリセットする修正）
  text.split('\n').forEach(para=>{
    if(!para.trim())return;
    const sents=para.split(/([。！？…」』])/).filter(s=>s.trim());
    let ps=[];for(let i=0;i<sents.length;i++){
      if(/[。！？…」』]/.test(sents[i])&&ps.length>0)ps[ps.length-1]+=sents[i];else ps.push(sents[i]);
    }
    for(let i=0;i<=ps.length-sens;i++){
      const getE=(s)=>s.replace(/[「」『』。！？…―\s]/g,'').slice(-2);
      const target=getE(ps[i]);if(target.length<2)continue;
      let c=1;for(let j=i+1;j<ps.length;j++){if(getE(ps[j])===target)c++;else break;}
      if(c>=sens){issues.push({type:'gobi',word:target,message:`「${target}」が${c}回連続`});i+=c-1;}
    }
  });

  // 2. 表記ゆれ
  yureRules.forEach(([a,b])=>{
    if(text.includes(a)&&text.includes(b))issues.push({type:'yure',wordA:a,wordB:b,message:`「${a}」と「${b}」が混在`});
  });

  // 3. 多用（名前分割対策：ひらがなのみ3文字を無視）
  const words3={};const chars=text.replace(/[\s\n「」『』（）、。！？…―─\-]/g,'');
  for(let i=0;i<=chars.length-3;i++){
    const w=chars.substring(i,3+i);
    if(/^[ぁ-ん]{3}$/.test(w))continue; // したが、でした、等は無視
    words3[w]=(words3[w]||0)+1;
  }
  Object.entries(words3).filter(([w,c])=>c>=freqT).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([w,c])=>{
    issues.push({type:'freq',word:w,message:`「${w}」が${c}回（多用）`});
  });

  renderProof(text);
}

function renderProof(text){
  const sum=document.getElementById('proofSum'),tEl=document.getElementById('proofText');
  let h=`<div style="font-size:12px;color:var(--text3);margin-bottom:8px">${issues.length}件の指摘</div>`;
  issues.forEach((is,i)=>{
    h+=`<div class="proof-item" onclick="jumpTo(${i})"><span class="proof-tag ${is.type}">${is.type}</span>${is.message}</div>`;
  });
  sum.innerHTML=h;sum.style.display='block';

  let html=eH(text);
  issues.forEach((is,i)=>{
    const target=is.word||is.wordA;
    const reg=new RegExp(eR(target),'g');
    html=html.replace(reg,`<span class="hl-${is.type}" data-type="${is.type}" data-w="${eH(target)}" data-alt="${eH(is.wordB||'')}" onclick="sPop(event,this)">${target}</span>`);
  });
  tEl.innerHTML=html;tEl.style.display='block';
}

function sPop(e,el){
  e.stopPropagation();const p=document.getElementById('yPop');
  const type=el.dataset.type,w=el.dataset.w,alt=el.dataset.alt;
  let con=`<div class="yure-popup-title">「${eH(w)}」の書き換え</div>`;
  if(type==='yure'){
    con+=`<button class="btn btn-primary btn-sm" onclick="repWord('${eH(w)}','${eH(alt)}')">「${eH(alt)}」に置換</button>`;
  }
  con+=`<input type="text" id="popIn" class="input-text" value="${eH(w)}">
        <button class="btn btn-primary btn-sm" onclick="repWord('${eH(w)}',document.getElementById('popIn').value)">修正を反映</button>`;
  p.innerHTML=con;
  const r=el.getBoundingClientRect();p.style.display='block';
  p.style.left=Math.min(r.left,window.innerWidth-230)+'px';p.style.top=(r.bottom+window.scrollY+8)+'px';
}
function hPop(){document.getElementById('yPop').style.display='none';}
function repWord(f,t){
  const s=document.getElementById('srcEditor');
  s.value=s.value.replace(new RegExp(eR(f),'g'),t);
  upPrev();upCt();hPop();runProof();toast('修正しました');
}

function jumpTo(i){
  const els=document.querySelectorAll(`.hl-${issues[i].type}`);
  if(els.length){els[0].scrollIntoView({behavior:'smooth',block:'center'});}
}
function save(){localStorage.setItem('novelcraft_src',document.getElementById('srcEditor').value);toast('保存しました');}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000);}
function eH(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eR(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
</script>
</body>
</html>
