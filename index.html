<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>執筆補助</title>
<meta name="theme-color" content="#e87b6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="執筆補助">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#e87b6b;--primary-dark:#c9584a;--primary-light:#f5a99e;--primary-pale:#fdf0ee;--bg:#fef8f7;--surface:#fff;--border:#f0d5d1;--text:#4a2525;--text2:#7a4545;--text3:#aa7777;--success:#4a9e6e;--warn:#c48a2a;--warnbg:#fef9eb;--info:#5b8fd4;--info-pale:#eaf1fb;--shadow:rgba(232,123,107,.15);--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--font-mincho:'Zen Old Mincho',serif;--tr:.2s ease}
.mi{font-family:'Material Icons Round';font-style:normal;font-size:20px;line-height:1;vertical-align:middle;user-select:none}.mi-sm{font-size:16px}.mi-xs{font-size:14px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100}.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}.header h1{font-size:18px;font-weight:700;color:var(--primary-dark);display:flex;align-items:center;gap:10px}.char-counts{display:flex;gap:12px;font-size:12px;color:var(--text2)}.char-counts span{background:var(--primary-pale);padding:4px 12px;border-radius:20px}
.tab-nav{max-width:1200px;margin:0 auto;padding:12px 24px 0;display:flex;gap:4px;overflow-x:auto}.tab-btn{font-size:13px;font-weight:500;padding:10px 18px;border:none;background:transparent;color:var(--text3);cursor:pointer;border-radius:var(--radius-md) var(--radius-md) 0 0;white-space:nowrap;display:flex;align-items:center;gap:6px}.tab-btn.active{background:var(--surface);color:var(--primary-dark);box-shadow:0 1px 6px var(--shadow);font-weight:700}
.main{max-width:1200px;margin:0 auto;padding:0 24px 40px}.tab-panel{display:none;background:var(--surface);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);box-shadow:0 1px 6px var(--shadow);padding:24px}.tab-panel.active{display:block}
.editor-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}textarea,.output-area{width:100%;min-height:480px;padding:16px;font-family:var(--font-mincho);font-size:15px;line-height:2.2;border:1.5px solid var(--border);border-radius:var(--radius-md);background:var(--surface);color:var(--text)}.output-area{background:var(--bg);overflow-y:auto;white-space:pre-wrap;word-wrap:break-word}
.settings-panel{margin-bottom:16px}.settings-body{display:none;margin-top:12px;padding:20px;background:var(--bg);border-radius:var(--radius-md);border:1px solid var(--border)}.settings-body.open{display:block}
.btn{font-size:13px;font-weight:500;padding:8px 16px;border:none;border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:var(--tr)}.btn-primary{background:var(--primary);color:#fff}.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}.btn-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.hl-yure{background:rgba(196,138,42,.18);border-bottom:2px solid var(--warn);cursor:pointer}.hl-gobi{background:rgba(232,123,107,.18);border-bottom:2px solid var(--primary);cursor:pointer}.hl-ng{background:rgba(91,143,212,.18);border-bottom:2px solid var(--info);cursor:pointer}.hl-freq{background:rgba(164,91,212,.18);border-bottom:2px solid #9b59b6;cursor:pointer}
.yure-popup{position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:0 4px 16px var(--shadow);padding:12px;min-width:240px;font-size:13px}
.proof-item{padding:10px;border-bottom:1px solid var(--primary-pale);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px}
.proof-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0}.proof-tag.gobi{background:var(--primary-pale);color:var(--primary-dark)}.proof-tag.freq{background:#f3eafa;color:#9b59b6}
.input-text{font-size:13px;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);width:100%;margin-bottom:8px}
.split-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px var(--shadow)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;transition:var(--tr);opacity:0;z-index:600}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:768px){.editor-layout{grid-template-columns:1fr}.desktop-col{display:none}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><h1><span class="mi">edit_note</span>執筆補助</h1><div class="char-counts"><span>原文: <strong id="srcCount">0</strong></span><span>完成版: <strong id="outCount">0</strong></span></div></div></header>
<nav class="tab-nav">
    <button class="tab-btn active" data-tab="editor"><span class="mi mi-sm">edit</span>エディタ</button>
    <button class="tab-btn" data-tab="proofread"><span class="mi mi-sm">search</span>推敲</button>
    <button class="tab-btn" data-tab="split"><span class="mi mi-sm">content_cut</span>分割</button>
</nav>
<main class="main">
    <section class="tab-panel active" id="panel-editor">
        <div class="settings-panel"><button class="btn btn-secondary" onclick="document.getElementById('sBody').classList.toggle('open')"><span class="mi mi-sm">settings</span>設定・ツール</button>
            <div class="settings-body" id="sBody">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px">
                    <label><input type="checkbox" id="optIndent" checked> 行頭字下げ</label>
                    <label><input type="checkbox" id="optBracket" checked> 」前の句点削除</label>
                    <label><input type="checkbox" id="optSpace" checked> ！？後の空白</label>
                </div>
                <div class="btn-bar" style="border-top:1px solid var(--border);padding-top:15px">
                    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('fileIn').click()"><span class="mi mi-xs">file_upload</span>読込</button>
                    <input type="file" id="fileIn" style="display:none" accept=".txt" onchange="loadTxt(event)">
                    <button class="btn btn-secondary btn-sm" onclick="expTxt('src')"><span class="mi mi-xs">download</span>原文DL</button>
                    <button class="btn btn-secondary btn-sm" onclick="expTxt('fmt')"><span class="mi mi-xs">download</span>完成版DL</button>
                </div>
            </div>
        </div>
        <div class="editor-layout">
            <div class="editor-col"><h3>原文</h3><textarea id="srcEditor" placeholder="ここに貼り付け..."></textarea>
                <div class="btn-bar"><button class="btn btn-primary" onclick="formatDirect()">体裁を整える</button><button class="btn btn-secondary" onclick="save()">保存</button><button class="btn btn-secondary" onclick="copyOut()"><span class="mi mi-xs">content_copy</span>完成版をコピー</button></div>
            </div>
            <div class="editor-col desktop-col"><h3>完成版プレビュー</h3><div class="output-area" id="outPrev"></div></div>
        </div>
    </section>

    <section class="tab-panel" id="panel-proofread">
        <div style="margin-bottom:15px;display:flex;gap:20px;background:var(--primary-pale);padding:15px;border-radius:var(--radius-md)">
            <div>語尾：<select id="gobiSens"><option value="2">2回</option><option value="3" selected>3回</option></select></div>
            <div>多用：<select id="freqThresh"><option value="3">3回以上</option><option value="5" selected>5回以上</option></select></div>
            <button class="btn btn-primary" onclick="runProof()">チェック実行</button>
        </div>
        <div id="proofSum" class="output-area" style="min-height:80px;height:auto;margin-bottom:10px;display:none"></div>
        <div id="proofText" class="output-area" style="display:none"></div>
    </section>

    <section class="tab-panel" id="panel-split">
        <div style="margin-bottom:20px;background:var(--primary-pale);padding:15px;border-radius:var(--radius-md)">
            分割数：<input type="number" id="spCnt" value="2" min="2" style="width:60px;padding:5px;border-radius:5px;border:1px solid var(--border)">
            <button class="btn btn-primary" onclick="runSplit()" style="margin-left:10px">分割実行</button>
        </div>
        <div id="spRes"></div>
    </section>
</main>
<div class="yure-popup" id="yPop" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
let fmt='', issues=[];
const src=document.getElementById('srcEditor');

// タブ切り替え
document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click',()=>{
        document.querySelectorAll('.tab-btn,.tab-panel').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); document.getElementById('panel-'+b.dataset.tab).classList.add('active');
    });
});

// 自動更新と保存読込
src.addEventListener('input',()=>{upPrev();upCt();});
window.onload=()=>{const s=localStorage.getItem('novelcraft_src');if(s){src.value=s;upPrev();upCt();}};

function upPrev(){
    let t=src.value;
    if(document.getElementById('optBracket').checked) t=t.replace(/。([」』])/g,'$1');
    if(document.getElementById('optSpace').checked) t=t.replace(/([！？]+)(?=[^\s！？」』\n])/g,'$1　');
    fmt=t.split('\n').map(l=>{
        if(document.getElementById('optIndent').checked && l.trim() && !/^[　「『（]/.test(l)) return '　'+l;
        return l;
    }).join('\n');
    const out=document.getElementById('outPrev'); if(out) out.textContent=fmt;
}
function upCt(){document.getElementById('srcCount').textContent=src.value.length;document.getElementById('outCount').textContent=fmt.length;}

// IO機能
function save(){localStorage.setItem('novelcraft_src',src.value);toast('保存しました');}
function copyOut(){navigator.clipboard.writeText(fmt);toast('完成版をコピーしました');}
function loadTxt(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{src.value=ev.target.result;upPrev();upCt();toast('読み込みました');};r.readAsText(f);e.target.value='';}
function expTxt(m){dl(m==='src'?src.value:fmt, m==='src'?'original.txt':'formatted.txt');}
function dl(t,f){const b=new Blob([t],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=f;a.click();URL.revokeObjectURL(a.href);}
function formatDirect(){src.value=fmt;upPrev();toast('原文を書き換えました');}

// 推敲機能
function runProof(){
    const text=fmt||src.value; issues=[];
    const sens=+document.getElementById('gobiSens').value, freqT=+document.getElementById('freqThresh').value;

    // 1. 語尾連続（段落リセット）
    text.split('\n').forEach(para=>{
        if(!para.trim())return;
        const sents=para.split(/([。！？…」』])/).filter(s=>s.trim());
        let ps=[]; for(let i=0;i<sents.length;i++){
            if(/[。！？…」』]/.test(sents[i])&&ps.length>0) ps[ps.length-1]+=sents[i]; else ps.push(sents[i]);
        }
        for(let i=0;i<=ps.length-sens;i++){
            const getE=(s)=>s.replace(/[「」『』。！？…―\s]/g,'').slice(-2);
            const target=getE(ps[i]); if(target.length<2)continue;
            let c=1; for(let j=i+1;j<ps.length;j++){if(getE(ps[j])===target)c++; else break;}
            if(c>=sens){issues.push({type:'gobi',word:target,msg:`「${target}」が${c}回連続`}); i+=c-1;}
        }
    });

    // 2. 多用（名前分割対策）
    const words3={}; const chars=text.replace(/[\s\n「」『』（）、。！？…―─\-]/g,'');
    for(let i=0;i<=chars.length-3;i++){
        const w=chars.substring(i,i+3);
        if(/^[ぁ-ん]{3}$/.test(w))continue; // ひらがな3文字（したが、でした等）は無視
        words3[w]=(words3[w]||0)+1;
    }
    Object.entries(words3).filter(([w,c])=>c>=freqT).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([w,c])=>{
        issues.push({type:'freq',word:w,msg:`「${w}」が${c}回`});
    });

    renderProof(text);
}

function renderProof(text){
    const sum=document.getElementById('proofSum'), tEl=document.getElementById('proofText');
    sum.innerHTML=issues.map((is,i)=>`<div class="proof-item" onclick="jumpTo('${eH(is.word)}')"><span class="proof-tag ${is.type}">${is.type==='gobi'?'語尾':'多用'}</span>${is.msg}</div>`).join('')||'指摘なし';
    sum.style.display='block';

    // ハイライト生成（HTMLタグ漏れ対策：エスケープ済みのテキストを置換）
    let html=eH(text);
    const sorted = [...new Set(issues.map(is=>is.word))].sort((a,b)=>b.length - a.length);
    sorted.forEach(w=>{
        const reg=new RegExp(eR(w),'g');
        html=html.replace(reg,`<span class="hl-freq" data-w="${eH(w)}" onclick="sPop(event,this)">${eH(w)}</span>`);
    });
    tEl.innerHTML=html; tEl.style.display='block';
}

function sPop(e,el){
    e.stopPropagation(); const p=document.getElementById('yPop'), w=el.dataset.w;
    p.innerHTML=`<div style="font-size:11px;color:var(--text3);margin-bottom:5px">「${eH(w)}」の修正</div>
    <input type="text" id="popIn" class="input-text" value="${eH(w)}">
    <button class="btn btn-primary btn-sm" onclick="repWord('${eH(w).replace(/'/g,"\\'")}',document.getElementById('popIn').value)">反映</button>
    <button class="btn btn-secondary btn-sm" onclick="hPop()">閉じる</button>`;
    p.style.display='block'; p.style.left=Math.min(e.pageX, window.innerWidth-250)+'px'; p.style.top=(e.pageY+15)+'px';
}
function hPop(){document.getElementById('yPop').style.display='none';}
function repWord(f,t){
    src.value=src.value.replace(new RegExp(eR(f),'g'),t);
    upPrev(); hPop(); runProof(); toast('修正しました');
}
function jumpTo(w){
    const el=[...document.querySelectorAll('[data-w]')].find(x=>x.innerText===w);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

// 分割機能
function runSplit(){
    const t=fmt||src.value, sc=+document.getElementById('spCnt').value;
    const size=Math.ceil(t.length/sc), pts=[];
    for(let i=0;i<sc;i++) pts.push(t.substring(i*size,(i+1)*size));
    window._sp=pts;
    document.getElementById('spRes').innerHTML=pts.map((p,i)=>`
    <div class="split-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <strong>パート ${i+1}</strong><span style="font-size:12px;color:var(--text3)">${p.length}文字</span>
        </div>
        <pre style="font-size:11px;color:#888;white-space:pre-wrap;margin-bottom:10px;max-height:60px;overflow:hidden">${eH(p.substring(0,80))}...</pre>
        <div class="btn-bar">
            <button class="btn btn-secondary btn-sm" onclick="cpSP(${i})"><span class="mi mi-xs">content_copy</span>コピー</button>
            <button class="btn btn-secondary btn-sm" onclick="dl(window._sp[${i}],'part${i+1}.txt')"><span class="mi mi-xs">download</span>保存</button>
        </div>
    </div>`).join('');
}
function cpSP(i){if(window._sp?.[i]){navigator.clipboard.writeText(window._sp[i]);toast('パート '+(i+1)+' をコピー');}}

function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000);}
function eH(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eR(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
document.addEventListener('click',e=>{if(!e.target.closest('.yure-popup'))hPop();});
</script>
</body>
</html>
